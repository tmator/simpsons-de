[keyboard]

; Boutons / coins / tilt
enter=["switch", "s_credit_button"]
c=["switch", "s_left_coin"]
v=["switch", "s_center_coin"]
b=["switch", "s_right_coin"]
t=["switch", "s_plumb_tilt"]
shift+t=["switch", "s_slam_tilt"]

; Ball devices / positions de bille
o=["switch", "s_outhole"]
shift+q=["switch", "s_trough1", "toggle"]
shift+w=["switch", "s_trough2", "toggle"]
shift+e=["switch", "s_trough3", "toggle"]
space=["switch", "s_shooter_lane", "toggle"]

; Flippers / lanes
q=["switch", "s_left_eos"]
m=["switch", "s_right_eos"]

a=["switch", "s_left_outlane"]
z=["switch", "s_left_return"]
k=["switch", "s_right_outlane"]
l=["switch", "s_right_return"]

; Slingshots principaux
s=["switch", "s_left_slingshot"]
p=["switch", "s_right_slingshot"]

; Chocolates
x=["switch", "s_chocolate"]
shift+x=["switch", "s_chocolate2"]
shift+c=["switch", "s_chocolate3"]

; Locks
u=["switch", "s_left_lock", "toggle"]
i=["switch", "s_center_lock_bottom", "toggle"]
j=["switch", "s_center_lock_top", "toggle"]
r=["switch", "s_right_lock", "toggle"]

; Bowling
g=["switch", "s_bowling1"]
h=["switch", "s_bowling2"]
y=["switch", "s_bowling3"]

; Spinner / rampes
n=["switch", "s_spinner"]
e=["switch", "s_ramp_entrance"]
d=["switch", "s_ramp_exit"]

; Sling 1 à 5
shift+a=["switch", "s_sling1"]
shift+z=["switch", "s_sling2"]
shift+k=["switch", "s_sling3"]
shift+l=["switch", "s_sling4"]
shift+s=["switch", "s_sling5"]

; Bumpers
f=["switch", "s_left_bumper"]
w=["switch", "s_center_bumper"]
shift+p=["switch", "s_right_bumper"]

; Donuts
shift+u=["switch", "s_left_donut"]
shift+i=["switch", "s_center_donut"]
shift+r=["switch", "s_right_donut"]

; Multiball
shift+m=["switch", "s_multiball_start"]

; -----------------------------------------------------------------------
; VIDEO MODES - debug launch
; shift+v -> debug_start_video_donut_catch
; shift+b -> debug_start_video_bart_skate
; shift+n -> debug_start_video_reactor_escape
; CONFLIT : shift+c est déjà utilisé par s_chocolate3
;   -> utilisation de shift+d pour debug_start_video_couch_shuffle
; -----------------------------------------------------------------------
shift+v=["event", "debug_start_video_donut_catch"]
shift+b=["event", "debug_start_video_bart_skate"]
shift+n=["event", "debug_start_video_reactor_escape"]
shift+d=["event", "debug_start_video_couch_shuffle"]

; VIDEO MODES - contrôles communs
; left / right / up / down : libres dans la config existante
; shift+space : space est utilisé (s_shooter_lane) mais shift+space est libre
; escape : libre
left=["event", "video_mode_left"]
right=["event", "video_mode_right"]
up=["event", "video_mode_up"]
down=["event", "video_mode_down"]
shift+space=["event", "video_mode_action"]
escape=["event", "stop_video_mode"]

[sound_system]
music={"type": "solo"}
effects={"default": true,"simultaneous_sounds": 3,"type": "simultaneous"}
voice={"type": "sequential"}
